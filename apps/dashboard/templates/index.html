<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAAS Dashboard</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="shell">
        <header class="topbar">
            <div>
                <h1>DAAS Airspace Dashboard</h1>
                <p>Live view of drones, advisories, and restricted zones.</p>
            </div>
            <div class="status">
                <span id="live-status" class="ok">Live feed connected</span>
                <span id="drone-count">Drones: 0</span>
                <span id="event-count">Events: 0</span>
            </div>
        </header>
        <main class="layout">
            <section id="map"></section>
            <aside class="panel">
                <h2>Airspace Events</h2>
                <div id="event-log"></div>
            </aside>
        </main>
    </div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/static/map.js"></script>
</body>
</html>
